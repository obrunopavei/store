<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bazar do Bruno — Quadrinhos Marvel & DC, mangás e itens geek com desconto em coleções completas.">
  <title>Bazar do Bruno — Quadrinhos & Cultura Geek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    :root {
      --bg: #07070f;
      --surface: #0e0e1c;
      --surface-2: #13131f;
      --surface-3: #1a1a2c;
      --border: rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.14);
      --text: #e8e8f2;
      --text-2: #7878a8;
      --text-3: #3a3a58;
      --gold: #f0c040;
      --gold-lt: #ffd878;
      --gold-dk: #c89820;
      --green: #25d366;
      --green-dk: #128c7e;
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --font-d: 'Bebas Neue', sans-serif;
      --font-b: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 clamp(1rem, 4vw, 3rem);
    }

    /* ── Header ─────────────────────────────────────── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px;
      display: flex; align-items: center;
      background: rgba(7,7,15,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .site-header .container { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark {
      width: 38px; height: 38px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 1px rgba(240,192,64,0.3);
    }
    .logo-mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .logo-text {
      font-family: var(--font-d); font-size: 22px; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--gold-lt), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-wa {
      display: flex; align-items: center; gap: 7px;
      background: var(--green); color: #fff;
      font-weight: 700; font-size: 0.82rem;
      padding: 8px 16px; border-radius: 100px;
      text-decoration: none; transition: all 0.25s var(--ease);
    }
    .header-wa:hover { background: var(--green-dk); transform: translateY(-1px); }

    /* ── Modal ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(4,4,12,0.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s var(--ease);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 24px;
      width: 100%; max-width: 680px;
      max-height: 90vh; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--surface-3) transparent;
      transform: translateY(28px) scale(0.97);
      transition: transform 0.35s var(--ease);
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-hero {
      position: relative; width: 100%; height: 280px;
      overflow: hidden; background: var(--surface-3); flex-shrink: 0;
      border-radius: 24px 24px 0 0;
    }
    .modal-hero img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .modal-hero-stack {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-hero-stack .stk { position: absolute; }
    .modal-hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
      background: linear-gradient(to top, var(--surface) 0%, transparent 100%);
      pointer-events: none;
    }
    .modal-badges {
      position: absolute; top: 14px; left: 14px; right: 14px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; z-index: 10;
    }

    .modal-body { padding: 1.5rem 2rem 2rem; }

    .modal-vol-label {
      font-size: 0.72rem; font-weight: 700; color: var(--gold);
      text-transform: uppercase; letter-spacing: 1.5px;
      display: flex; align-items: center; gap: 6px; margin-bottom: 0.5rem;
    }
    .modal-vol-label::before {
      content: ''; width: 14px; height: 2px; background: var(--gold); border-radius: 2px;
    }
    .modal-title {
      font-family: var(--font-d); font-size: 2rem; letter-spacing: 0.5px;
      line-height: 1.05; margin-bottom: 0.3rem;
    }
    .modal-sub { font-size: 0.9rem; color: var(--text-2); margin-bottom: 1.5rem; line-height: 1.6; }

    /* Volume list */
    .vol-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 1.5rem; }
    .vol-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .vol-row:last-child { border-bottom: none; }
    .vol-thumb {
      width: 42px; height: 58px; border-radius: 5px;
      overflow: hidden; flex-shrink: 0;
      background: var(--surface-3); border: 1px solid var(--border);
    }
    .vol-thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .vol-thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--text-3);
    }
    .vol-info { flex: 1; min-width: 0; }
    .vol-title { font-weight: 700; font-size: 0.88rem; line-height: 1.3; }
    .vol-spec { font-size: 0.76rem; color: var(--text-2); margin-top: 2px; line-height: 1.4; }

    /* Modal price row */
    .modal-price-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .modal-prices { display: flex; flex-direction: column; gap: 2px; }
    .modal-orig { font-size: 0.82rem; color: var(--text-3); text-decoration: line-through; }
    .modal-main { font-family: var(--font-d); font-size: 2.2rem; line-height: 1; }
    .modal-main.gold { color: var(--gold); }
    .modal-main.white { color: var(--text); }
    .modal-save { font-size: 0.75rem; color: #55dda8; font-weight: 600; }

    /* Close button */
    .modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 20;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text); font-size: 1.1rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .modal-close:hover { background: rgba(255,255,255,0.12); }

    @media (max-width: 500px) {
      .modal-body { padding: 1.2rem 1.2rem 1.5rem; }
      .modal-title { font-size: 1.6rem; }
      .modal-hero { height: 220px; }
    }

    /* ── Filters ────────────────────────────────────── */
    .filters-bar {
      position: sticky; top: 64px; z-index: 90;
      margin-top: 64px; /* space for fixed header */
      background: rgba(7,7,15,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 0;
    }
    .filters-scroll {
      display: flex; gap: 0.6rem; align-items: center;
      overflow-x: auto; scrollbar-width: none;
      padding: 4px 0;
    }
    .filters-scroll::-webkit-scrollbar { display: none; }
    .f-btn {
      flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-2); font-family: var(--font-b);
      font-size: 0.83rem; font-weight: 500;
      padding: 8px 18px; border-radius: 100px;
      cursor: pointer; transition: all 0.22s var(--ease); white-space: nowrap;
    }
    .f-btn:hover { border-color: var(--border-hi); color: var(--text); background: var(--surface-2); }
    .f-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 700; }

    /* ── Catalog ────────────────────────────────────── */
    .catalog { padding: 3rem 0 7rem; }
    .card { cursor: pointer; }
    .catalog-hd {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap; margin-bottom: 2.5rem;
    }
    .catalog-hd h2 { font-family: var(--font-d); font-size: 2rem; letter-spacing: 1px; }
    .count-chip {
      background: var(--surface); border: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-2);
      padding: 6px 14px; border-radius: 100px;
    }

    /* ── Grid ───────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.5rem;
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      display: flex; flex-direction: column;
      opacity: 0; transform: translateY(22px);
      transition:
        opacity 0.55s var(--ease),
        transform 0.55s var(--ease),
        border-color 0.25s,
        background-color 0.25s,
        box-shadow 0.3s;
    }
    .card.in { opacity: 1; transform: translateY(0); }
    .card.in:hover {
      transform: translateY(-7px);
      border-color: var(--border-hi);
      background-color: var(--surface-2);
      box-shadow: var(--shadow-lg);
    }

    /* ── Card Image ─────────────────────────────────── */
    .card-img-wrap {
      position: relative; width: 100%; height: 290px;
      overflow: hidden; background: var(--surface-3); flex-shrink: 0;
    }
    .card-img-wrap::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
      background: linear-gradient(to top, var(--surface) 0%, transparent 100%);
      pointer-events: none; z-index: 2;
    }
    /* gradient syncs with hover bg */
    .card.in:hover .card-img-wrap::after {
      background: linear-gradient(to top, var(--surface-2) 0%, transparent 100%);
    }

    .solo-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--ease);
    }
    .card.in:hover .solo-img { transform: scale(1.06); }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; color: var(--text-3);
      background: linear-gradient(135deg, var(--surface-2), var(--surface-3));
    }

    /* Bundle stack */
    .stack-wrap {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .stk {
      position: absolute; width: 46%; aspect-ratio: 2/3;
      border-radius: 6px; overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.65);
      transition: transform 0.5s var(--ease);
    }
    .stk img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .stk.s0 { transform: rotate(-9deg) translate(-32%, 9%); z-index: 1; }
    .stk.s1 { transform: rotate(6deg) translate(28%, 2%); z-index: 2; }
    .stk.s2 { transform: rotate(-1.5deg) translate(0, -5%); z-index: 3; }
    .stk.solo { position: relative; width: 62%; transform: none !important; z-index: 1; }
    .card.in:hover .stk.s0 { transform: rotate(-13deg) translate(-42%, 14%); }
    .card.in:hover .stk.s1 { transform: rotate(10deg) translate(38%, 4%); }
    .card.in:hover .stk.s2 { transform: rotate(-2deg) translate(0, -10%); }

    /* Badges */
    .badges {
      position: absolute; top: 12px; left: 12px; right: 12px;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 8px; z-index: 10;
    }
    .tag {
      background: rgba(0,0,0,0.72); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); font-size: 0.68rem; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 5px 10px; border-radius: 100px;
    }
    .tag.marvel   { border-color: rgba(226,54,54,0.45);  color: #ff8888; }
    .tag.dc       { border-color: rgba(74,144,217,0.45); color: #90c0ff; }
    .tag.mangas   { border-color: rgba(178,114,255,0.45);color: #cc88ff; }
    .tag.graphic  { border-color: rgba(64,200,150,0.45); color: #55dda8; }
    .tag.jogos    { border-color: rgba(240,160,48,0.45); color: #ffb84a; }
    .tag.eletronicos { border-color: rgba(64,160,240,0.45); color: #78ccff; }
    .tag.outros   { border-color: rgba(160,160,190,0.45);color: #b0b0d8; }
    .off-badge {
      background: linear-gradient(135deg, var(--gold-lt), var(--gold-dk));
      color: #000; font-size: 0.7rem; font-weight: 800;
      letter-spacing: 1px; padding: 5px 10px; border-radius: 100px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Card Body ──────────────────────────────────── */
    .card-body {
      padding: 1.2rem 1.5rem 1.5rem;
      display: flex; flex-direction: column; flex: 1; gap: 0.45rem;
    }
    .vol-label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--gold); text-transform: uppercase; letter-spacing: 1.2px;
      display: flex; align-items: center; gap: 6px;
    }
    .vol-label::before {
      content: ''; width: 14px; height: 2px;
      background: var(--gold); border-radius: 2px;
    }
    .card-title {
      font-family: var(--font-d); font-size: 1.5rem;
      letter-spacing: 0.5px; line-height: 1.05; color: var(--text);
    }
    .card-sub {
      font-size: 0.82rem; color: var(--text-2); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
    .chip {
      background: var(--surface-3); border: 1px solid var(--border);
      color: var(--text-2); font-size: 0.68rem; font-weight: 500;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    }
    .spacer { flex: 1; min-height: 0.5rem; }

    /* ── Price + CTA ────────────────────────────────── */
    .price-row {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 1rem; padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }
    .prices { display: flex; flex-direction: column; gap: 2px; }
    .price-orig { font-size: 0.8rem; color: var(--text-3); text-decoration: line-through; }
    .price-main {
      font-family: var(--font-d); font-size: 1.9rem; line-height: 1;
    }
    .price-main.gold { color: var(--gold); }
    .price-main.white { color: var(--text); }
    .price-save { font-size: 0.7rem; color: #55dda8; font-weight: 600; }

    .btn-wa {
      display: flex; align-items: center; gap: 7px;
      background: linear-gradient(135deg, #25d366, #1aab55);
      color: #fff; font-weight: 700; font-size: 0.8rem;
      padding: 10px 16px; border-radius: 10px;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
      transition: all 0.25s var(--ease);
      border: none; cursor: pointer;
    }
    .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,211,102,0.32); }
    .btn-wa svg { flex-shrink: 0; }

    /* ── Featured Carousel ──────────────────────────── */
    .featured-section {
      padding: 2rem 0 0;
    }
    .featured-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; gap: 1rem;
    }
    .featured-label {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-d); font-size: 1.5rem; letter-spacing: 1px;
    }
    .featured-label::before {
      content: ''; width: 4px; height: 22px;
      background: linear-gradient(180deg, var(--gold-lt), var(--gold-dk));
      border-radius: 4px; flex-shrink: 0;
    }
    .carousel-nav { display: flex; gap: 8px; }
    .carousel-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.22s var(--ease); flex-shrink: 0;
    }
    .carousel-btn:hover { background: var(--surface-3); border-color: var(--border-hi); color: var(--text); }
    .carousel-btn:disabled { opacity: 0.3; cursor: default; }

    .carousel-track-wrap {
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      cursor: grab;
    }
    .carousel-track-wrap.dragging { cursor: grabbing; }
    .carousel-track {
      display: flex; gap: 1rem;
      will-change: transform;
      /* transition controlled entirely by JS */
    }

    /* Featured card */
    .fcard {
      flex: 0 0 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden; cursor: pointer;
      transition:
        border-color 0.25s, background-color 0.25s,
        box-shadow 0.3s, transform 0.3s var(--ease);
      opacity: 0; transform: translateY(16px);
    }
    .fcard.in { opacity: 1; transform: translateY(0); }
    .fcard.in:hover {
      transform: translateY(-6px);
      border-color: var(--border-hi);
      background-color: var(--surface-2);
      box-shadow: var(--shadow-lg);
    }
    .fcard-img {
      position: relative; width: 100%; height: 200px;
      overflow: hidden; background: var(--surface-3);
    }
    .fcard-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s var(--ease);
    }
    .fcard.in:hover .fcard-img img { transform: scale(1.06); }
    .fcard-img::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(to top, var(--surface) 0%, transparent 100%);
      pointer-events: none;
    }
    .fcard.in:hover .fcard-img::after {
      background: linear-gradient(to top, var(--surface-2) 0%, transparent 100%);
    }
    .fcard-badges {
      position: absolute; top: 10px; left: 10px; z-index: 10;
    }
    .fcard-body {
      padding: 0.9rem 1.1rem 1.1rem;
      display: flex; flex-direction: column; gap: 4px;
    }
    .fcard-platform {
      font-size: 0.68rem; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .fcard-title {
      font-family: var(--font-d); font-size: 1.2rem;
      letter-spacing: 0.5px; line-height: 1.1; color: var(--text);
    }
    .fcard-sub {
      font-size: 0.75rem; color: var(--text-2); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .fcard-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem; margin-top: 0.6rem;
      padding-top: 0.7rem; border-top: 1px solid var(--border);
    }
    .fcard-price {
      font-family: var(--font-d); font-size: 1.4rem; color: var(--text); line-height: 1;
    }
    .fcard-wa {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, #25d366, #1aab55);
      color: #fff; text-decoration: none;
      transition: all 0.22s var(--ease);
    }
    .fcard-wa:hover { transform: scale(1.1); box-shadow: 0 4px 14px rgba(37,211,102,0.35); }

    /* Carousel dots */
    .carousel-dots {
      display: flex; gap: 6px; justify-content: center; margin-top: 1rem;
    }
    .c-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--surface-3); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .c-dot.active { background: var(--gold); border-color: var(--gold); width: 18px; border-radius: 3px; }

    /* Catalog divider */
    .catalog-divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 2.5rem 0 0;
    }
    .catalog-divider-line { flex: 1; height: 1px; background: var(--border); }
    .catalog-divider-lbl {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--text-3); white-space: nowrap;
    }

    @media (max-width: 500px) {
      .fcard { flex: 0 0 200px; }
      .fcard-img { height: 160px; }
    }

    /* ── No results ─────────────────────────────────── */
    .empty {
      grid-column: 1/-1; text-align: center; padding: 5rem 2rem;
      color: var(--text-3);
    }

// ── Helpers ─────────────────────────────────────────────
function brl(v) {
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function tagCls(t) { return TAG_CLASS[t] || ''; }
function waLink(msg) { return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`; }

// ── Process data ─────────────────────────────────────────
function process(items) {
  const groups = {};
  const solo = [];
  items.forEach(item => {
    if (STANDALONE.has(item.bundle)) { solo.push(item); }
    else {
      (groups[item.bundle] = groups[item.bundle] || []).push(item);
    }
  });

  const bundles = Object.entries(groups).map(([key, its]) => {
    const total = Math.round(its.reduce((s, i) => s + i.valor, 0) * 100) / 100;
    const disc  = Math.round(total * 0.91 * 100) / 100;
    const save  = Math.round((total - disc) * 100) / 100;
    const imgs  = its.map(i => i.imagem).filter(Boolean);
    const tags  = [...new Set(its.map(i => i.tag))];
    const name  = BUNDLE_NAMES[key] || its[0].titulo;
    const list  = its.map(i => `  • ${i.titulo}${i.subtitulo ? ': ' + i.subtitulo : ''} (${i.volume})`).join('\n');
    const msg   = `Olá! Tenho interesse na *Coleção ${name}* 📚\n\n` +
                  `Itens inclusos (${its.length} volumes):\n${list}\n\n` +
                  `💰 Total: ${brl(total)} → *${brl(disc)}* (9% OFF)\n\n` +
                  `Poderia me passar mais informações sobre disponibilidade e envio?`;
    const displayCount = VOLUME_COUNT[key] || its.length;
    return { type:'bundle', id:key, name, tags, items:its, imgs, total, disc, save, wa:waLink(msg), displayCount };
  });

  const standalones = solo.map(item => {
    const msg = `Olá! Tenho interesse em:\n\n` +
                `📗 *${item.titulo}${item.subtitulo ? ': ' + item.subtitulo : ''}*\n` +
                `📦 ${item.volume}\n🏢 ${item.editora}\n\n` +
                `💰 Valor: *${brl(item.valor)}*\n\n` +
                `Poderia me passar mais informações sobre disponibilidade e envio?`;
    return { type:'standalone', id:`${item.titulo}_${item.volume}`, ...item, tags:[item.tag], wa:waLink(msg) };
  });

  return [...bundles, ...standalones];
}

// ── Render helpers ───────────────────────────────────────
const WA_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.556 4.122 1.527 5.854L.057 23.454a.5.5 0 00.595.617l5.741-1.504A11.941 11.941 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.869 0-3.626-.479-5.157-1.322l-.367-.209-3.808.998 1.016-3.706-.228-.376A9.944 9.944 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;

function tagBadge(t) {
  return `<span class="tag ${tagCls(t)}">${t}</span>`;
}

function bundleImgs(imgs) {
  if (!imgs.length) return `<div class="img-placeholder">📚</div>`;
  const src = imgs.slice(0, 3);
  if (src.length === 1) {
    return `<div class="stack-wrap"><div class="stk solo"><img src="${src[0]}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\'background:#1a1a2c;width:100%;height:100%\'></div>'"></div></div>`;
  }
  return `<div class="stack-wrap">${src.map((s, i) =>
    `<div class="stk s${i}"><img src="${s}" alt="" loading="lazy" onerror="this.parentElement.style.background='#1a1a2c'"></div>`
  ).join('')}</div>`;
}

function renderBundle(p) {
  const chips = p.items.slice(0, 4).map(i => `<span class="chip">${i.subtitulo || i.volume}</span>`).join('');
  const more  = p.items.length > 4 ? `<span class="chip">+${p.items.length - 4} mais</span>` : '';
  return `
<article class="card" data-tags="${p.tags.join(',')}">
  <div class="card-img-wrap">
    ${bundleImgs(p.imgs)}
    <div class="badges">
      <div style="display:flex;gap:4px;flex-wrap:wrap">${p.tags.map(tagBadge).join('')}</div>
      <span class="off-badge">9% OFF</span>
    </div>
  </div>
  <div class="card-body">
    <div class="vol-label">${p.displayCount} volumes inclusos</div>
    <h2 class="card-title">Coleção ${p.name}</h2>
    <div class="chips">${chips}${more}</div>
    <div class="spacer"></div>
    <div class="price-row">
      <div class="prices">
        <span class="price-orig">${brl(p.total)}</span>
        <span class="price-main gold">${brl(p.disc)}</span>
        <span class="price-save">Você economiza ${brl(p.save)}</span>
      </div>
      <a href="${p.wa}" class="btn-wa" target="_blank" rel="noopener" aria-label="Comprar via WhatsApp">
        ${WA_SVG}<span>Tenho Interesse</span>

  </div>
</article>`;
}

function renderStandalone(p) {
  const imgHtml = p.imagem
    ? `<img class="solo-img" src="${p.imagem}" alt="${p.titulo}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`+
      `<div class="img-placeholder" style="display:none">${p.titulo.charAt(0)}</div>`
    : `<div class="img-placeholder">${p.titulo.charAt(0)}</div>`;
  const sub = p.subtitulo ? `<p class="card-sub">${p.subtitulo}</p>` : '';
  return `
<article class="card" data-tags="${p.tag}">
  <div class="card-img-wrap">
    ${imgHtml}
    <div class="badges">${tagBadge(p.tag)}</div>
  </div>
  <div class="card-body">
    <div class="vol-label">${p.volume}</div>
    <h2 class="card-title">${p.titulo}</h2>
    ${sub}
    <div class="spacer"></div>
    <div class="price-row">
      <div class="prices">
        <span class="price-main white">${brl(p.valor)}</span>
      </div>
      <a href="${p.wa}" class="btn-wa" target="_blank" rel="noopener" aria-label="Comprar via WhatsApp">
        ${WA_SVG}<span>Tenho Interesse</span>
      </a>
    </div>
  </div>
</article>`;
}

// ── State & render ───────────────────────────────────────
const ALL = process(RAW);
let active = 'todos';

function getFiltered() {
  return active === 'todos' ? ALL : ALL.filter(p => p.tags.includes(active));
}

function animateCards(grid) {
  const cards = grid.querySelectorAll('.card');
  let idx = 0;
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const delay = Math.min(idx++, 9) * 55;
        setTimeout(() => e.target.classList.add('in'), delay);
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.04, rootMargin: '0px 0px -30px 0px' });
  cards.forEach(c => obs.observe(c));
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('cat-title').textContent = active === 'todos' ? 'Todos os itens' : active;
  document.getElementById('cat-count').textContent = `${filtered.length} ${filtered.length === 1 ? 'item' : 'itens'}`;
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><h3>Nenhum item encontrado</h3><p>Tente outro filtro.</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(p => p.type === 'bundle' ? renderBundle(p) : renderStandalone(p)).join('');
  animateCards(grid);
}

function buildFilters() {
  const allTags = ALL.flatMap(p => p.tags);
  const unique = [...new Set(allTags)];
  const wrap = document.getElementById('filters');
  wrap.innerHTML = ['Todos', ...unique].map(t => {
    const val = t === 'Todos' ? 'todos' : t;
    return `<button class="f-btn${val === 'todos' ? ' active' : ''}" data-f="${val}">${t}</button>`;
  }).join('');
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.f-btn');
    if (!btn) return;
    wrap.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    active = btn.dataset.f;
    render();
    document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

function buildHeroStats() {
  const bundles = ALL.filter(p => p.type === 'bundle').length;
  document.getElementById('hero-stats').innerHTML = `
    <div><div class="stat-val">${ALL.length}</div><div class="stat-lbl">Itens disponíveis</div></div>
    <div><div class="stat-val">${bundles}</div><div class="stat-lbl">Coleções completas</div></div>
    <div><div class="stat-val">10%</div><div class="stat-lbl">Desconto em coleções</div></div>`;
}

// ── Modal ─────────────────────────────────────────────────
const overlay = document.getElementById('modal-overlay');
const modal   = document.getElementById('modal');

function openModal(product) {
  modal.innerHTML = buildModalHTML(product);
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  modal.querySelector('.modal-close').addEventListener('click', closeModal);
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function buildModalHTML(p) {
  if (p.type === 'bundle') {
    const imgHTML = (() => {
      if (!p.imgs.length) return `<div class="img-placeholder" style="height:100%">📚</div>`;
      const src = p.imgs.slice(0, 3);
      if (src.length === 1) return `<img src="${src[0]}" alt="${p.name}" onerror="this.style.display='none'">`;
      return `<div class="modal-hero-stack">${src.map((s,i)=>
        `<div class="stk s${i}"><img src="${s}" alt="" loading="lazy" onerror="this.parentElement.style.background='#1a1a2c'"></div>`
      ).join('')}</div>`;
    })();

    const rows = p.items.map((it) => {
      const thumb = it.imagem
        ? `<img src="${it.imagem}" alt="${it.titulo}" loading="lazy" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span style=\'font-size:.9rem\'>📚</span>')">`
        : `<div class="vol-thumb-placeholder">📚</div>`;
      return `
      <div class="vol-row">
        <div class="vol-thumb">${thumb}</div>
        <div class="vol-info">
          <div class="vol-title">${it.titulo}${it.subtitulo ? ' — ' + it.subtitulo : ''}</div>
          <div class="vol-spec">${it.especificacao}</div>
        </div>
      </div>`;
    }).join('');

    return `
      <div style="position:relative">
        <div class="modal-hero">
          ${imgHTML}
          <div class="modal-badges">
            <div style="display:flex;gap:4px;flex-wrap:wrap">${p.tags.map(tagBadge).join('')}</div>
            <span class="off-badge">9% OFF</span>
          </div>
          <button class="modal-close" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-vol-label">${p.displayCount} volumes inclusos</div>
          <h2 class="modal-title">Coleção ${p.name}</h2>
          <div class="vol-list">${rows}</div>
          <div class="modal-price-row">
            <div class="modal-prices">
              <span class="modal-orig">${brl(p.total)}</span>
              <span class="modal-main gold">${brl(p.disc)}</span>
              <span class="modal-save">Você economiza ${brl(p.save)}</span>
            </div>
            <a href="${p.wa}" class="btn-wa" target="_blank" rel="noopener">
              ${WA_SVG}<span>Tenho Interesse</span>
            </a>
          </div>
        </div>
      </div>`;
  } else {
    // standalone
    const imgHTML = p.imagem
      ? `<img src="${p.imagem}" alt="${p.titulo}" onerror="this.style.display='none'">`
      : `<div class="img-placeholder" style="height:100%">${p.titulo.charAt(0)}</div>`;
    const sub = p.subtitulo ? `<p class="modal-sub">${p.subtitulo}</p>` : '';
    const desc = p.descricao ? `<p class="modal-sub" style="margin-bottom:0.5rem">${p.descricao}</p>` : '';
    const spec = p.especificacao ? `<p class="modal-sub" style="font-size:0.78rem;opacity:0.7">${p.especificacao}</p>` : '';
    return `
      <div style="position:relative">
        <div class="modal-hero">
          ${imgHTML}
          <div class="modal-badges">${tagBadge(p.tag)}</div>
          <button class="modal-close" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-vol-label">${p.volume}</div>
          <h2 class="modal-title">${p.titulo}</h2>
          ${sub}
          ${desc}
          ${spec}
          <div class="modal-price-row" style="margin-top:1.25rem">
            <div class="modal-prices">
              <span class="modal-main white">${brl(p.valor)}</span>
            </div>
            <a href="${p.wa}" class="btn-wa" target="_blank" rel="noopener">
              ${WA_SVG}<span>Tenho Interesse</span>
            </a>
          </div>
        </div>
      </div>`;
  }
}

// ── Card click delegation ─────────────────────────────────
document.getElementById('grid').addEventListener('click', e => {
  // Don't open modal if clicking the WA button itself
  if (e.target.closest('.btn-wa')) return;
  const card = e.target.closest('.card');
  if (!card) return;
  const filtered = getFiltered();
  const idx = Array.from(document.querySelectorAll('.card')).indexOf(card);
  if (idx !== -1) openModal(filtered[idx]);
});

// ── Featured Carousel ────────────────────────────────────
// Featured order: Watch + Commander first, then games
const FEATURED_ORDER = [
  'Samsung Galaxy Watch 6',
  'Magic: The Gathering',
  'Monster Hunter Rise',
  'Dark Souls',
  'Final Fantasy XII',
  'Civilization VI',

const featuredItems = (() => {
  const byTitle = {};

function renderFcard(item) {
  const imgHtml = item.imagem
    ? `<img src="${item.imagem}" alt="${item.titulo}" loading="lazy" onerror="this.style.display='none'">`

<div class="fcard" data-wa="${waLink(waMsg).replace(/"/g,'&quot;')}">

        ${WA_SVG}

function buildCarousel() {
  const track    = document.getElementById('carousel-track');
  const dotsWrap = document.getElementById('carousel-dots');
  const prevBtn  = document.getElementById('car-prev');
  const nextBtn  = document.getElementById('car-next');
  const wrap     = track.parentElement; // .carousel-track-wrap

  track.innerHTML = featuredItems.map(renderFcard).join('');
  requestAnimationFrame(() => {
    track.querySelectorAll('.fcard').forEach((c, i) => {
      setTimeout(() => c.classList.add('in'), i * 80);
    });
  });

  // ── State ──────────────────────────────────────────────
  let current   = 0;
  let autoDir   = 1;        // bounces between +1 / -1
  let autoTimer = null;
  let dragActive = false;
  let dragMoved  = false;
  let dragStartX = 0;
  let dragStartOffset = 0;
  let dragLastX  = 0;
  let dragVelocity = 0;     // px/ms, for flick

  // ── Helpers ────────────────────────────────────────────
  function cw() {
    const c = track.querySelector('.fcard');
    return c ? c.getBoundingClientRect().width + 16 : 276; // 16 = gap (1rem)
  }
  function maxOffset() { return (featuredItems.length - 1) * cw(); }

  function applyTransform(px, smooth) {
    track.style.transition = smooth
      ? 'transform 0.52s cubic-bezier(0.33,1,0.68,1)'  // ease-out-cubic — decelerates naturally
      : 'none';
    track.style.transform = `translateX(${-px}px)`;
  }

  function syncUI() {
    dotsWrap.querySelectorAll('.c-dot').forEach((d, i) => d.classList.toggle('active', i === current));
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current >= featuredItems.length - 1;
  }

  function goTo(idx, smooth = true) {
    current = Math.max(0, Math.min(Math.round(idx), featuredItems.length - 1));
    applyTransform(current * cw(), smooth);
    syncUI();
  }

  // ── Dots ───────────────────────────────────────────────
  dotsWrap.innerHTML = featuredItems.map((_,i) =>
    `<div class="c-dot${i===0?' active':''}" data-i="${i}"></div>`
  ).join('');
  dotsWrap.addEventListener('click', e => {
    const d = e.target.closest('.c-dot');
    if (d) { resetAuto(); goTo(+d.dataset.i); }
  });

  // ── Arrows ─────────────────────────────────────────────
  prevBtn.addEventListener('click', () => { resetAuto(); goTo(current - 1); });
  nextBtn.addEventListener('click', () => { resetAuto(); goTo(current + 1); });
  prevBtn.disabled = true;

  // ── Resize ─────────────────────────────────────────────
  window.addEventListener('resize', () => goTo(current, false), { passive: true });

  // ── Auto-scroll (bounce) ───────────────────────────────
  const AUTO_MS = 3200;
  function tick() {
    const next = current + autoDir;
    if (next >= featuredItems.length) { autoDir = -1; goTo(current - 1); }
    else if (next < 0)               { autoDir =  1; goTo(current + 1); }
    else                              { goTo(next); }
    prevBtn.disabled = false; nextBtn.disabled = false; // re-enable after bounce
  }
  function startAuto() { autoTimer = setInterval(tick, AUTO_MS); }
  function stopAuto()  { clearInterval(autoTimer); autoTimer = null; }
  function resetAuto() { stopAuto(); startAuto(); }

  // Auto-scroll disabled

  // ── Drag / Swipe ───────────────────────────────────────
  let dragTimestamp = 0;

  function onDragStart(x) {
    dragActive   = true;
    dragMoved    = false;
    dragStartX   = x;
    dragLastX    = x;
    dragVelocity = 0;
    dragTimestamp = performance.now();
    dragStartOffset = current * cw();
    track.style.transition = 'none';
    wrap.classList.add('dragging');
    stopAuto();
  }

  function onDragMove(x) {
    if (!dragActive) return;
    const now = performance.now();
    const dt  = now - dragTimestamp || 1;
    dragVelocity = (x - dragLastX) / dt;  // px/ms, positive = right
    dragLastX  = x;
    dragTimestamp = now;

    const dx = x - dragStartX;
    if (Math.abs(dx) > 4) dragMoved = true;
    if (!dragMoved) return;

    // Rubber-band resistance at edges
    let raw = dragStartOffset - dx;
    if (raw < 0)             raw = raw * 0.25;
    if (raw > maxOffset())   raw = maxOffset() + (raw - maxOffset()) * 0.25;

    track.style.transform = `translateX(${-raw}px)`;
  }

  function onDragEnd(x) {
    if (!dragActive) return;
    dragActive = false;
    wrap.classList.remove('dragging');

    if (dragMoved) {
      const dx = x - dragStartX;
      const speed = Math.abs(dragVelocity); // px/ms

      let target;
      if (speed > 0.4) {
        // Flick: advance in direction of velocity
        target = dragVelocity > 0 ? current - 1 : current + 1;
      } else {
        // Snap to nearest based on distance
        const endOffset = dragStartOffset - dx;
        target = Math.round(endOffset / cw());
      }
      goTo(target);
    }

    setTimeout(() => { dragMoved = false; }, 0);
    resetAuto();
  }

  // Mouse events
  wrap.addEventListener('mousedown', e => { e.preventDefault(); onDragStart(e.clientX); });
  window.addEventListener('mousemove', e => onDragMove(e.clientX));
  window.addEventListener('mouseup',  e => onDragEnd(e.clientX));

  // Touch events
  wrap.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX), { passive: true });
  wrap.addEventListener('touchmove',  e => { onDragMove(e.touches[0].clientX); }, { passive: true });
  wrap.addEventListener('touchend',   e => onDragEnd(e.changedTouches[0].clientX));

  // ── Click → modal (only if not dragged) ────────────────
  track.addEventListener('click', e => {
    if (dragMoved) return;
    if (e.target.closest('.fcard-wa')) return;
    const card = e.target.closest('.fcard');
    if (!card) return;
    const idx = Array.from(track.querySelectorAll('.fcard')).indexOf(card);
    if (idx === -1) return;
    const item = featuredItems[idx];
    const waMsg = `Olá! Tenho interesse em:\n\n` +
      `🎮 *${item.titulo}${item.subtitulo ? ': ' + item.subtitulo : ''}*\n` +
      `📦 ${item.volume}\n🏢 ${item.editora}\n\n` +
      `💰 Valor: *${brl(item.valor)}*\n\n` +
      `Poderia me passar mais informações sobre disponibilidade e envio?`;
    openModal({ type:'standalone', ...item, tags:[item.tag], wa:waLink(waMsg) });
  });

  syncUI();
}

// ── Header scroll ────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('site-header').style.background =
    scrollY > 10 ? 'rgba(7,7,15,0.97)' : 'rgba(7,7,15,0.82)';
}, { passive: true });

// ── Init ─────────────────────────────────────────────────
buildFilters();
buildCarousel();
render();
